name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: git -C /opt/finances pull origin main

      - name: Install dependencies
        run: /opt/finances/venv/bin/pip install -r /opt/finances/requirements.txt

      - name: Restart service
        run: sudo systemctl restart finance-dashboard
