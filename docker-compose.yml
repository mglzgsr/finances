version: "3.9"

services:
  finance-dashboard:
    build: .
    container_name: finance-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/finance.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/summary"]
      interval: 30s
      timeout: 10s
      retries: 3
